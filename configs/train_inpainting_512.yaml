defaults:
  base: configs/base.yaml
  tasks: configs/tasks_inpainting_512.yaml

tasks:
  enabled: [inpainting]

training:
  epochs: 30
  lr: 0.0001
  weight_decay: 0.0
  num_workers: 2
  use_amp: true
  val_every: 2
  early_stop_patience: 4
  early_stop_min_delta: 0.01
  save_top_k: 3
  save_dir: experiments/checkpoints
  log_dir: experiments/logs
  run_dir: experiments/runs

model:
  name: baseline_unet
  in_channels: 3
  out_channels: 3
  base_channels: 64

loss:
  l1_weight: 1.0
  ssim_weight: 0.1
  inpaint_hole_weight: 6.0
  inpaint_valid_weight: 1.0
  inpaint_tv_weight: 0.05
